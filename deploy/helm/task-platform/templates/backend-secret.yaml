apiVersion: v1
kind: Secret
metadata:
  name: {{ include "task-platform.backend.secret" . }}
  labels:
    {{- include "task-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.backend.secretEnv.databaseUrl | quote }}
  JWT_SECRET_KEY: {{ .Values.backend.secretEnv.jwtSecretKey | quote }}
  OPENAI_API_KEY: {{ .Values.backend.secretEnv.openaiApiKey | quote }}
  QDRANT_API_KEY: {{ .Values.backend.secretEnv.qdrantApiKey | quote }}

