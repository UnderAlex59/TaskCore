{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "task-platform.fullname" . }}
  labels:
    {{- include "task-platform.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: {{ $.Values.ingress.backendPath | quote }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "task-platform.backend.fullname" $ }}
                port:
                  number: {{ $.Values.backend.service.port }}
          - path: {{ $.Values.ingress.frontendPath | quote }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "task-platform.frontend.fullname" $ }}
                port:
                  number: {{ $.Values.frontend.service.port }}
    {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}

