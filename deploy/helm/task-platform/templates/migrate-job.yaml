{{- if .Values.backend.migrationJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "task-platform.backend.fullname" . }}-migrate
  labels:
    {{- include "task-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "-5"
spec:
  backoffLimit: {{ .Values.backend.migrationJob.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.backend.migrationJob.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "task-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: "{{ .Values.backend.image.repository }}:{{ default .Chart.AppVersion .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: {{ include "task-platform.backend.configmap" . }}
            - secretRef:
                name: {{ include "task-platform.backend.secret" . }}
          resources:
            {{- toYaml .Values.backend.migrationJob.resources | nindent 12 }}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

