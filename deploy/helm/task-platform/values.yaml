nameOverride: ""
fullnameOverride: ""

global:
  imagePullSecrets: []

backend:
  replicaCount: 2
  image:
    repository: task-platform-backend
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  env:
    jwtAlgorithm: HS256
    accessTokenExpireMinutes: 15
    refreshTokenExpireDays: 7
    cookieSecure: true
    cookieSameSite: lax
    cookieDomain: ""
    allowedOrigins:
      - https://app.example.com
    qdrantUrl: http://qdrant:6333
    ollamaBaseUrl: http://ollama:11434
    llmProvider: openai
    llmModel: gpt-4o
    embeddingModel: text-embedding-3-small
    uploadDir: /var/lib/task-platform/uploads
    dbPoolSize: 10
    dbMaxOverflow: 20
    dbPoolTimeout: 30
    dbPoolRecycle: 1800
    uvicornWorkers: 1
  secretEnv:
    databaseUrl: postgresql+asyncpg://app_user:change_me@postgres:5432/taskplatform
    jwtSecretKey: change-me-to-a-long-random-secret
    openaiApiKey: ""
    qdrantApiKey: ""
  extraEnv: []
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  strategy:
    type: RollingUpdate
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  probes:
    liveness:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    startup:
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 12
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 75
  pdb:
    enabled: true
    minAvailable: 1
  migrationJob:
    enabled: true
    ttlSecondsAfterFinished: 300
    backoffLimit: 2
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

frontend:
  replicaCount: 2
  image:
    repository: task-platform-frontend
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
  proxy:
    backendUpstream: ""
  extraEnv: []
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  strategy:
    type: RollingUpdate
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  probes:
    liveness:
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 3
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    startup:
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 75
  pdb:
    enabled: true
    minAvailable: 1

uploads:
  persistence:
    enabled: true
    existingClaim: ""
    accessModes:
      - ReadWriteMany
    size: 10Gi
    storageClass: ""

ingress:
  enabled: false
  className: nginx
  annotations: {}
  frontendPath: /
  backendPath: /api
  hosts:
    - host: app.example.com
  tls: []

