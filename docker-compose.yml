services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_pass
      POSTGRES_DB: taskplatform
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d taskplatform"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://app_user:app_pass@postgres:5432/taskplatform
      QDRANT_URL: http://qdrant:6333
      UPLOAD_DIR: /var/lib/task-platform/uploads
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - uploads:/var/lib/task-platform/uploads

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://app_user:app_pass@postgres:5432/taskplatform
      QDRANT_URL: http://qdrant:6333
      UPLOAD_DIR: /var/lib/task-platform/uploads
      LANGGRAPH_IMAGES_DIR: /var/lib/task-platform/langgraph_graphs
      UVICORN_WORKERS: 1
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    volumes:
      - uploads:/var/lib/task-platform/uploads
      - ./langgraph_graphs:/var/lib/task-platform/langgraph_graphs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz').read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    environment:
      BACKEND_UPSTREAM: backend:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  pgdata:
  qdrant_data:
  uploads:
