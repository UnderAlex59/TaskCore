<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="680" viewBox="0 0 1800 680" role="img" aria-labelledby="title desc">
  <title id="title">Итоговая структура обработки требования в магистерской системе</title>
  <desc id="desc">Схема показывает последовательность обработки требования: создание, сохранение, LangGraph-валидация, RAG-индексация, чат, предложения изменений, ручное подтверждение, разработка, тестирование и завершение.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { fill: #111827; font: 700 24px Arial, sans-serif; }
      .subtitle { fill: #4b5563; font: 400 15px Arial, sans-serif; }
      .band { fill: #f9fafb; stroke: #e5e7eb; stroke-width: 1; }
      .node { fill: #ffffff; stroke: #9ca3af; stroke-width: 1.4; rx: 8; }
      .node-primary { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; rx: 8; }
      .node-store { fill: #f0f9ff; stroke: #0284c7; stroke-width: 1.5; rx: 8; }
      .node-graph { fill: #f7fee7; stroke: #65a30d; stroke-width: 1.5; rx: 8; }
      .node-artifact { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 8; }
      .node-human { fill: #fdf2f8; stroke: #be185d; stroke-width: 1.5; rx: 8; }
      .label { fill: #111827; font: 700 16px Arial, sans-serif; text-anchor: middle; }
      .small { fill: #374151; font: 400 13px Arial, sans-serif; text-anchor: middle; }
      .band-label { fill: #374151; font: 700 14px Arial, sans-serif; }
      .edge { fill: none; stroke: #4b5563; stroke-width: 1.7; marker-end: url(#arrow); }
      .edge-soft { fill: none; stroke: #6b7280; stroke-width: 1.3; stroke-dasharray: 7 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="680"/>
  <text class="title" x="40" y="42">Итоговая структура обработки требования</text>
  <text class="subtitle" x="40" y="68">Связь workflow, PostgreSQL, LangGraph, RAG-памяти, чата и экспертного контроля</text>

  <rect class="band" x="28" y="92" width="1744" height="132" rx="10"/>
  <text class="band-label" x="46" y="118">1. Создание и сохранение требования</text>

  <rect class="band" x="28" y="252" width="1744" height="150" rx="10"/>
  <text class="band-label" x="46" y="278">2. Автоматическая проверка и индексируемая проектная память</text>

  <rect class="band" x="28" y="430" width="1744" height="176" rx="10"/>
  <text class="band-label" x="46" y="456">3. Обсуждение, предложения изменений и прохождение жизненного цикла</text>

  <rect class="node-primary" x="54" y="136" width="150" height="58"/>
  <text class="label" x="129" y="160">Требование</text>
  <text class="small" x="129" y="180">текст и атрибуты</text>

  <rect class="node-primary" x="244" y="128" width="175" height="74"/>
  <text class="label" x="331.5" y="154">Frontend</text>
  <text class="small" x="331.5" y="174">создание</text>
  <text class="small" x="331.5" y="190">и редактирование</text>

  <rect class="node-primary" x="459" y="128" width="185" height="74"/>
  <text class="label" x="551.5" y="154">Backend</text>
  <text class="small" x="551.5" y="174">workflow</text>
  <text class="small" x="551.5" y="190">и бизнес-логика</text>

  <rect class="node-store" x="684" y="128" width="190" height="74"/>
  <text class="label" x="779" y="154">PostgreSQL</text>
  <text class="small" x="779" y="174">задачи, статусы,</text>
  <text class="small" x="779" y="190">артефакты</text>

  <rect class="node-graph" x="684" y="292" width="190" height="74"/>
  <text class="label" x="779" y="318">validation_graph</text>
  <text class="small" x="779" y="338">проверка</text>
  <text class="small" x="779" y="354">качества</text>

  <rect class="node-artifact" x="914" y="292" width="205" height="74"/>
  <text class="label" x="1016.5" y="318">validation_result</text>
  <text class="small" x="1016.5" y="338">issues, questions,</text>
  <text class="small" x="1016.5" y="354">verdict</text>

  <rect class="node-graph" x="1159" y="292" width="190" height="74"/>
  <text class="label" x="1254" y="318">rag_pipeline</text>
  <text class="small" x="1254" y="338">подготовка</text>
  <text class="small" x="1254" y="354">chunks</text>

  <rect class="node-store" x="1389" y="292" width="190" height="74"/>
  <text class="label" x="1484" y="318">Qdrant</text>
  <text class="small" x="1484" y="338">RAG-память</text>
  <text class="small" x="1484" y="354">проекта</text>

  <rect class="node-graph" x="684" y="476" width="190" height="74"/>
  <text class="label" x="779" y="502">chat_graph</text>
  <text class="small" x="779" y="522">маршрутизация</text>
  <text class="small" x="779" y="538">сообщений</text>

  <rect class="node-graph" x="914" y="438" width="205" height="74"/>
  <text class="label" x="1016.5" y="464">QA Agent</text>
  <text class="small" x="1016.5" y="484">ответы</text>
  <text class="small" x="1016.5" y="500">по контексту</text>

  <rect class="node-graph" x="914" y="552" width="205" height="74"/>
  <text class="label" x="1016.5" y="578">ChangeTracker</text>
  <text class="small" x="1016.5" y="598">предложения</text>
  <text class="small" x="1016.5" y="614">изменений</text>

  <rect class="node-artifact" x="1159" y="552" width="205" height="74"/>
  <text class="label" x="1261.5" y="578">change_proposals</text>
  <text class="small" x="1261.5" y="598">управляемые</text>
  <text class="small" x="1261.5" y="614">корректировки</text>

  <rect class="node-human" x="1159" y="438" width="205" height="74"/>
  <text class="label" x="1261.5" y="464">Ручное</text>
  <text class="small" x="1261.5" y="484">подтверждение</text>
  <text class="small" x="1261.5" y="500">аналитиком</text>

  <rect class="node" x="1404" y="446" width="150" height="58"/>
  <text class="label" x="1479" y="470">Разработка</text>
  <text class="small" x="1479" y="490">in_progress</text>

  <rect class="node" x="1584" y="446" width="150" height="58"/>
  <text class="label" x="1659" y="470">Тестирование</text>
  <text class="small" x="1659" y="490">testing</text>

  <rect class="node" x="1584" y="548" width="150" height="58"/>
  <text class="label" x="1659" y="572">Завершение</text>
  <text class="small" x="1659" y="592">done</text>

  <path class="edge" d="M 204 165 L 244 165"/>
  <path class="edge" d="M 419 165 L 459 165"/>
  <path class="edge" d="M 644 165 L 684 165"/>
  <path class="edge" d="M 551.5 202 L 551.5 329 L 684 329"/>
  <path class="edge" d="M 874 329 L 914 329"/>
  <path class="edge" d="M 1119 329 L 1159 329"/>
  <path class="edge" d="M 1349 329 L 1389 329"/>
  <path class="edge" d="M 551.5 202 L 551.5 513 L 684 513"/>
  <path class="edge" d="M 874 513 L 914 475"/>
  <path class="edge" d="M 874 513 L 914 589"/>
  <path class="edge" d="M 1119 589 L 1159 589"/>
  <path class="edge" d="M 1016.5 366 L 1016.5 475 L 1159 475"/>
  <path class="edge" d="M 1364 475 L 1404 475"/>
  <path class="edge" d="M 1554 475 L 1584 475"/>
  <path class="edge" d="M 1659 504 L 1659 548"/>
  <path class="edge-soft" d="M 1484 366 L 1484 407 L 1016.5 407 L 1016.5 438"/>
  <path class="edge-soft" d="M 1261.5 552 L 1261.5 390 L 1484 390 L 1484 366"/>

  <text class="subtitle" x="54" y="650">Примечание: AI-сценарии формируют проверяемые артефакты, но окончательные решения по подтверждению и изменению требования остаются за участниками проекта.</text>
</svg>
